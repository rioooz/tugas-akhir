<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Detail Produk</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html">MAHESTY MEBEL</a>
      <div class="spacer"></div>
      <div class="search"><input placeholder="Search..." /></div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="riwayat.html">Riwayat</a>
      <a class="nav-link" href="pelanggan.html">Pelanggan</a>
      <a class="btn" href="cart.html">Cart (0)</a>
      <a class="btn-outline" href="login.html">Login / Register</a>
    </header>
    <main class="container">
      <section id="detail-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
          <a class="btn-outline" href="index.html">Kembali</a>
          <div></div>
        </div>
        <div class="detail">
          <div>
            <div class="big-img">GAMBAR</div>
          </div>
          <div class="meta">
            <div class="muted">Produk</div>
            <div style="font-weight:800; font-size:18px">Meja Rias Kayu Jati</div>
            <div class="muted small mb">Ukuran 120 x 50 x 75 cm</div>
            <div class="price-big">Rp800.000</div>
            <div class="buy" style="margin-top:12px">
              <div style="display:flex; gap:8px; align-items:center">
                <div class="qty">
                  <span class="btn-outline">-</span>
                  <div style="padding:6px 10px; border-radius:6px; background:#fff; border:1px solid #eee">1</div>
                  <span class="btn-outline">+</span>
                </div>
                <a class="btn" href="cart.html">Tambah ke Keranjang</a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
