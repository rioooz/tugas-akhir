<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Panel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html">MAHESTY MEBEL</a>
      <div class="spacer"></div>
      <div class="search"><input placeholder="Search..." /></div>
      <a class="nav-link" href="dashboard.html">Dashboard</a>
      <a class="nav-link" href="riwayat.html">Riwayat</a>
      <a class="nav-link" href="pelanggan.html">Pelanggan</a>
      <a class="btn" href="cart.html">Cart (0)</a>
      <a class="btn-outline" href="login.html">Login / Register</a>
      
    </header>
    <main class="container">
      <section style="margin-top:24px">
        <div class="section-title">Admin Panel</div>
        <div class="admin-panel">
          <aside class="admin-sidebar">
            <div style="font-weight:700; margin-bottom:8px">Menu</div>
            <div style="display:flex; flex-direction:column; gap:8px">
              <a class="btn-outline" href="#">Produk</a>
              <a class="btn-outline" href="#">Pesanan</a>
              <a class="btn-outline" href="#">Pelanggan</a>
              <a class="btn-outline" href="#">Laporan</a>
            </div>
          </aside>
          <div class="admin-main">
            <div class="panel">
              <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="font-weight:700">Kelola Produk</div>
                <a class="btn" href="#">Tambah Produk</a>
              </div>
              <div class="grid" style="margin-top:12px">
                <div class="card">
                  <div class="img">IMG</div>
                  <div class="title">Meja Rias</div>
                  <div style="display:flex; gap:8px">
                    <a class="btn-outline" href="#">Edit</a>
                    <a class="btn-outline" href="#">Hapus</a>
                  </div>
                </div>
                <div class="card">
                  <div class="img">IMG</div>
                  <div class="title">Rak Buku</div>
                  <div style="display:flex; gap:8px">
                    <a class="btn-outline" href="#">Edit</a>
                    <a class="btn-outline" href="#">Hapus</a>
                  </div>
                </div>
                <div class="card">
                  <div class="img">IMG</div>
                  <div class="title">Buffet TV</div>
                  <div style="display:flex; gap:8px">
                    <a class="btn-outline" href="#">Edit</a>
                    <a class="btn-outline" href="#">Hapus</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
